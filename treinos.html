<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treinos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <div class="container header-row">
            <a class="brand" href="index.html">Fitness App</a>
            <nav>
                <a href="início.html">Início</a>
                <a href="treinos.html">Treinos</a>
                <a href="resumo.html">Resumo</a>
                <a href="Menu.html">Menu</a>
                <a href="configuracoes.html">Configurações</a>
            </nav>
        </div>
    </header>

    <main class="container page-section">
        <section class="page-header">
            <h1>Os teus treinos</h1>
            <p>Adiciona, acompanha e atualiza as tuas sessões de treino.</p>
        </section>

        <section class="workout-grid">
            <div class="workout-panel">
                <div class="panel-header">
                    <h2>Treinos registados</h2>
                    <span id="workout-count">0</span>
                </div>
                <div id="workout-list" class="workout-list"></div>
            </div>

            <aside class="workout-form-card">
                <h2>Novo treino</h2>
                <form id="workout-form">
                    <label>Nome do treino</label>
                    <input type="text" id="workout-name" placeholder="Ex: Pernas" required>

                    <label>Categoria</label>
                    <select id="workout-category">
                        <option value="Cardio">Cardio</option>
                        <option value="Força">Força</option>
                        <option value="Mobilidade">Mobilidade</option>
                        <option value="Alongamento">Alongamento</option>
                    </select>

                    <label>Duração (min)</label>
                    <input type="number" id="workout-duration" min="5" value="30" required>

                    <button class="button" type="submit">Adicionar treino</button>
                </form>
            </aside>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container footer-row">
            <p>Fitness App • Treinos</p>
            <span>Criar hábitos saudáveis</span>
        </div>
    </footer>

    <script src="js/data.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
